<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TypeRacer</title>
<style>
body{
    margin:0;
    font-family:Segoe UI,sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}
.hidden{display:none;}
button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#00c6ff;
    color:black;
    font-weight:bold;
}
input{
    padding:10px;
    margin:5px;
    border-radius:6px;
    border:none;
}
#gameBox{
    width:90%;
    max-width:900px;
    margin:20px auto;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:16px;
}
.progressBar{
    height:18px;
    border-radius:10px;
    margin:8px 0;
}
#playerBar{background:#00ff88;}
.aiBar{background:#ff4444;}
.carBox{
    display:inline-block;
    padding:15px;
    margin:10px;
    background:rgba(255,255,255,0.1);
    border-radius:12px;
}
.selected{border:3px solid #00ff88;}
#commandBar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:400px;
    background:black;
    padding:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>TypeRacer</h1>

<div id="auth">
<h2>Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<br>
<button onclick="login()">Login</button>
<button onclick="showSignup()">Sign Up</button>
</div>

<div id="signupBox" class="hidden">
<h2>Create Account</h2>
<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">
<br>
<button onclick="signup()">Create</button>
<button onclick="cancelSignup()">Cancel</button>
</div>

<div id="mainGame" class="hidden">

<div>
<span id="playerInfo"></span>
<button onclick="logout()">Logout</button>
<button onclick="showGarage()">Garage</button>
<button onclick="showLeaderboard()">Leaderboard</button>
</div>

<div id="gameBox">
<div id="sentence"></div>
<input id="typingInput" oninput="checkTyping()" autocomplete="off">
<div class="progressBar" id="playerBar"></div>
<div class="progressBar aiBar" id="ai1"></div>
<div class="progressBar aiBar" id="ai2"></div>
<div id="result"></div>
<button onclick="newGame()">New Game</button>
</div>

<div id="garage" class="hidden">
<h2>🚘 Garage</h2>
<div id="carList"></div>
<button onclick="closeGarage()">Close</button>
</div>

<div id="leaderboardBox" class="hidden">
<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>
<button onclick="closeLeaderboard()">Close</button>
</div>

</div>

<div id="commandBar" class="hidden">
<input id="commandInput" placeholder="Enter command..." style="width:100%">
</div>

<script>

/* ===== DATA ===== */

let users=JSON.parse(localStorage.getItem("users"))||{};
let currentUser=null;
let xp=0,coins=0,level=1,cars=["Starter"],selectedCar="Starter";

function save(){localStorage.setItem("users",JSON.stringify(users));}

/* ===== AUTH ===== */

function showSignup(){
auth.classList.add("hidden");
signupBox.classList.remove("hidden");
}
function cancelSignup(){
signupBox.classList.add("hidden");
auth.classList.remove("hidden");
}

function signup(){
let u=newUser.value.trim();
let p=newPass.value.trim();
if(!u||!p) return alert("Fill fields.");
if(users[u]) return alert("User exists.");
users[u]={password:p,xp:0,coins:0,level:1,cars:["Starter"],selectedCar:"Starter"};
save();
alert("Account created!");
cancelSignup();
}

function login(){
let u=loginUser.value.trim();
let p=loginPass.value.trim();
if(!users[u]||users[u].password!==p||users[u].banned) 
return alert("Invalid or banned.");
currentUser=u;
loadUserData();
auth.classList.add("hidden");
mainGame.classList.remove("hidden");
updateInfo();
newGame();
}

function logout(){location.reload();}

function loadUserData(){
let data=users[currentUser];
xp=data.xp;coins=data.coins;level=data.level;
cars=data.cars;selectedCar=data.selectedCar;
}

function updateInfo(){
playerInfo.innerHTML=
`👤 ${currentUser} | 💎 XP:${xp} | 🪙 ${coins} | ⭐ ${level} | 🚘 ${selectedCar}`;
}

/* ===== GAME ===== */

const sentences=[
"Speed and precision create champions.",
"Typing mastery wins races.",
"Stay focused and push forward.",
"Practice daily to improve your skills.",
"Victory belongs to the prepared."
];

let sentence="",progress=0,ai1Progress=0,ai2Progress=0,interval;

function newGame(){
sentence=sentences[Math.floor(Math.random()*sentences.length)];
sentenceDiv.innerHTML=sentence;
typingInput.value="";
progress=ai1Progress=ai2Progress=0;
playerBar.style.width="0%";
ai1.style.width="0%";
ai2.style.width="0%";
result.innerHTML="";
clearInterval(interval);
interval=setInterval(updateAI,200);
}

function checkTyping(){
let val=typingInput.value;
if(sentence.startsWith(val)){
progress=(val.length/sentence.length)*100;
playerBar.style.width=progress+"%";
if(val===sentence) win();
}else typingInput.value=val.slice(0,-1);
}

function updateAI(){
ai1Progress+=Math.random()*3;
ai2Progress+=Math.random()*2.5;
ai1.style.width=ai1Progress+"%";
ai2.style.width=ai2Progress+"%";
if(ai1Progress>=100||ai2Progress>=100){
clearInterval(interval);
result.innerHTML="💀 You Lost!";
}
}

function win(){
clearInterval(interval);
result.innerHTML="🏆 You Win!";
xp+=20;coins+=50;
if(xp>=level*100){xp=0;level++;}
Object.assign(users[currentUser],{xp,coins,level});
save();
updateInfo();
}

/* ===== COMMAND SYSTEM ===== */

const OWNER_PASSWORD="/kuojbntq0wHKKX7vimYs6zzw15VfLFJ52kDQHeAVbk=";
let ownerAccess=false;

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="d"){
let entered=prompt("Owner Password:");
if(entered===OWNER_PASSWORD){
ownerAccess=true;
commandBar.classList.toggle("hidden");
if(!commandBar.classList.contains("hidden")){
setTimeout(()=>commandInput.focus(),50);
}
}else alert("Incorrect password.");
}
});

commandInput.addEventListener("keydown",function(e){
if(e.key==="Enter") executeCommand(this.value);
});

function executeCommand(cmd){

if(!ownerAccess) return alert("Unauthorized.");

let args=cmd.trim().split(" ");
let command=args[0]?.toLowerCase();
let target=args[1];
let value=args[2];

if(!users[target]) return alert("User not found.");

switch(command){

case "givecoins":
users[target].coins+=parseInt(value)||0;
break;

case "givecar":
if(!users[target].cars.includes(value))
users[target].cars.push(value);
break;

case "ban":
users[target].banned=true;
break;

case "removecar":
users[target].cars=
users[target].cars.filter(c=>c!==value);
break;

case "setlevel":
users[target].level=parseInt(value)||1;
break;

case "resetplayer":
users[target]={password:users[target].password,xp:0,coins:0,level:1,cars:["Starter"],selectedCar:"Starter"};
break;

case "close":
commandBar.classList.add("hidden");
return;

default:
return alert("Unknown command.");
}

save();

/* Refresh current session if targeting yourself */
if(target===currentUser){
loadUserData();
updateInfo();
}

alert("Command executed.");
commandInput.value="";
}

</script>

</body>
</html>
